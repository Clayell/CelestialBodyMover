name: publish-to-spacedock

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish-to-spacedock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: get-release-info
        id: get-release-info
        uses: KSPModdingLibs/KSPBuildTools/.github/actions/get-release-info@1.1.1
        with:
          release-tag: ''

      - name: upload-to-spacedock
        uses: ./.github/actions/spacedock-upload
        with:
          username: ${{ vars.SPACEDOCK_USERNAME }}
          password: ${{ secrets.SPACEDOCK_PASSWORD }}
          game_id: '3102' # hardcoded to KSP1 gameid.  retrieve from https://spacedock.info/api/games
          mod_id: ${{ vars.SPACEDOCK_MOD_ID }}
          version: ${{ steps.get-release-info.outputs.version-string }}
          zipball: ${{ steps.get-release-info.outputs.artifact-file }}
          changelog: ''