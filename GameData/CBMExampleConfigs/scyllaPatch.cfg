// CelestialBodyMover example patch:

// Modifies the 'Scylla' planet from the 'Extra Moon' mod (https://spacedock.info/mod/3163/Extra%20Moon). Requires ModuleManager, Kopernicus, and the 'Extra Moon' mod. If CBM is installed, this will only work in a new save.

@Kopernicus:NEEDS[KOPERNICUS]:AFTER[Scylla]
{
	@Body[Scylla]
	{
		@Properties
		{
			@description = A very small and low-density planet orbiting far out from Kerbol, with extremely low gravity.
			@geeASL = 0.000000015 // leads to a mass of about 66,000,000,000 kg, density of about .096158 kg/m^3
			//@rotationPeriod = 150 // uncomment this if you want to test a fast-rotator
		}
		
		@Orbit
		{
			@referenceBody = Sun
			@inclination = 5
			@eccentricity = 0.05
			@semiMajorAxis = 200000000000
		}
	}
}